# Major-industry-publication allow-list for v8.D Gate 2 (MEDIA_LOCKED
# classifier). PRD §8.D option 1 — static, curated, lives as data.
#
# How it's used: Gate 2's MEDIA_LOCKED classifier fires when ≥2 cluster
# queries return a result from any of these domains in the top-10. The
# vertical labels are flavor for findings ("media-locked by automotive
# publications: caranddriver.com, motortrend.com"); detection itself
# runs against the union of all domains here.
#
# How to grow this list: when a new vertical appears in your research
# work, add a `[<vertical>]` block with a `domains = [...]` list. Use
# bare-domain form (no scheme, no www. — match keys are lowercased
# domains as they appear in SerpAPI's `displayed_link` field).

[automotive]
domains = [
    "caranddriver.com",
    "motortrend.com",
    "autoweek.com",
    "autoblog.com",
    "jalopnik.com",
    "edmunds.com",
    "kbb.com",
    "thedrive.com",
]

